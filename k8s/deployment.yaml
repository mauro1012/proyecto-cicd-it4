apiVersion: apps/v1
kind: Deployment
metadata:
  name: it4-app-deployment
  labels:
    app: it4-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: it4-app
  template:
    metadata:
      labels:
        app: it4-app
    spec:
      containers:
      - name: it4-app
        image: tu-usuario-dockerhub/it4-app:latest # Reemplaza con tu usuario de DockerHub más adelante
        ports:
        - containerPort: 3000