name: Pipeline CI/CD IT4+

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Descargar código del repositorio
      uses: actions/checkout@v3

    - name: Configurar Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Instalar Dependencias
      run: npm install

    - name: Ejecutar Pruebas Unitarias (Test)
      run: npm test

  deploy-simulation:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
    - name: Descargar código del repositorio
      uses: actions/checkout@v3

    - name: Simular Construcción de Imagen Docker
      run: |
        echo "Construyendo la imagen Docker: docker build -t it4-app:latest ."
        docker build -t it4-app:latest .

    - name: Simular Despliegue en Kubernetes (Release Management)
      run: |
        echo "Aplicando manifiestos en el clúster K8s..."
        echo "kubectl apply -f k8s/deployment.yaml"
        echo "kubectl apply -f k8s/service.yaml"
        echo "Despliegue completado exitosamente. Cumpliendo COBIT BAI03 e ITIL Release."